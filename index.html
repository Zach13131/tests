<!DOCTYPE html>
<html lang="ru" data-theme="light">
    <head>

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Несколько тестов (вкладки)</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script>
            (function () {
                var t = localStorage.getItem('multi-quiz-theme');
                if (t === 'dark' || t === 'light')
                    document.documentElement.setAttribute('data-theme', t);
            })();
        </script>
        <style>
            :root {
                --font: 'Outfit', system-ui, -apple-system, sans-serif;
                --font-mono: 'JetBrains Mono', ui-monospace, monospace;
                --radius: 14px;
                --radius-sm: 10px;
                --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
                --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.12);
                --accent: #4f46e5;
                --accent-hover: #4338ca;
                --accent-muted: rgba(79, 70, 229, 0.12);
                --pass: #047857;
                --fail: #b91c1c;
            }

            [data-theme='light'] {
                --bg: #f1f5f9;
                --bg-elevated: #ffffff;
                --text: #0f172a;
                --text-muted: #64748b;
                --border: #e2e8f0;
                --border-strong: #cbd5e1;
                --surface: #f8fafc;
                --surface-hover: #f1f5f9;
                --tab-inactive: #e2e8f0;
                --tab-inactive-text: #475569;
                --hint-bg: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
                --hint-border: #c7d2fe;
                --code-bg: #ffffff;
                --toggle-track: #cbd5e1;
                --toggle-knob: #ffffff;
                --reveal-correct-border: #047857;
                --reveal-correct-bg: #d1fae5;
                --reveal-correct-text: #064e3b;
                --reveal-wrong-border: #b91c1c;
                --reveal-wrong-bg: #fee2e2;
                --reveal-wrong-text: #7f1d1d;
            }

            [data-theme='dark'] {
                --bg: #0c1222;
                --bg-elevated: #151b2e;
                --text: #f1f5f9;
                --text-muted: #94a3b8;
                --border: #2d3a52;
                --border-strong: #3d4f6f;
                --surface: #1a2235;
                --surface-hover: #232d45;
                --tab-inactive: #1e293b;
                --tab-inactive-text: #94a3b8;
                --hint-bg: linear-gradient(135deg, #1e1b4b 0%, #172554 100%);
                --hint-border: #4338ca;
                --code-bg: #0f172a;
                --toggle-track: #334155;
                --toggle-knob: #f8fafc;
                --shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
                --shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.45);
                --accent-muted: rgba(129, 140, 248, 0.15);
                --reveal-correct-border: #34d399;
                --reveal-correct-bg: rgba(6, 78, 59, 0.72);
                --reveal-correct-text: #ecfdf5;
                --reveal-wrong-border: #f87171;
                --reveal-wrong-bg: rgba(127, 29, 29, 0.55);
                --reveal-wrong-text: #fecaca;
                --pass: #6ee7b7;
                --fail: #fca5a5;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            html {
                color-scheme: light dark;
            }
            html[data-theme='light'] {
                color-scheme: light;
            }
            html[data-theme='dark'] {
                color-scheme: dark;
            }

            body {
                font-family: var(--font);
                margin: 0;
                min-height: 100dvh;
                padding: 24px 20px 40px;
                background: var(--bg);
                background-image: radial-gradient(
                    ellipse 120% 80% at 50% -40%,
                    var(--accent-muted),
                    transparent
                );
                color: var(--text);
                line-height: 1.5;
                transition: background-color 0.25s ease, color 0.25s ease;
            }

            .app-shell {
                max-width: 720px;
                margin: 0 auto;
            }

            .app-header {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                margin-bottom: 24px;
            }

            .app-header h1 {
                margin: 0;
                font-size: clamp(1.5rem, 4vw, 1.85rem);
                font-weight: 700;
                letter-spacing: -0.03em;
                background: linear-gradient(120deg, var(--accent), #a855f7);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            [data-theme='dark'] .app-header h1 {
                background: linear-gradient(120deg, #818cf8, #c084fc);
                -webkit-background-clip: text;
                background-clip: text;
            }

            .toolbar {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 10px;
            }

            .theme-toggle {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 8px 14px;
                border-radius: 999px;
                border: 1px solid var(--border);
                background: var(--bg-elevated);
                color: var(--text);
                font-family: var(--font);
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                box-shadow: var(--shadow);
                transition: transform 0.15s ease, border-color 0.2s, background 0.2s;
            }
            .theme-toggle:hover {
                border-color: var(--border-strong);
                transform: translateY(-1px);
            }
            .theme-toggle:active {
                transform: translateY(0);
            }
            .theme-toggle .icon {
                font-size: 1.1rem;
                line-height: 1;
            }

            .tabs {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-bottom: 20px;
            }

            .tabs button.tab {
                padding: 10px 16px;
                border: 1px solid var(--border);
                border-radius: 999px;
                background: var(--tab-inactive);
                color: var(--tab-inactive-text);
                cursor: pointer;
                font-family: var(--font);
                font-size: 13px;
                font-weight: 500;
                transition: background 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
            }
            .tabs button.tab:hover {
                background: var(--surface-hover);
                color: var(--text);
            }
            .tabs button.tab.active {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
                box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
            }
            .tabs button.tab:focus-visible {
                outline: 2px solid var(--accent);
                outline-offset: 2px;
            }

            .controls-card {
                background: var(--bg-elevated);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 14px 18px;
                margin-bottom: 20px;
                box-shadow: var(--shadow);
            }

            .toggle-row {
                display: flex;
                align-items: center;
                gap: 12px;
                flex-wrap: wrap;
            }

            .switch-label {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                font-size: 14px;
                color: var(--text-muted);
                user-select: none;
            }

            .switch-label input {
                position: absolute;
                opacity: 0;
                width: 0;
                height: 0;
            }

            .switch-ui {
                width: 44px;
                height: 26px;
                border-radius: 999px;
                background: var(--toggle-track);
                position: relative;
                flex-shrink: 0;
                transition: background 0.2s;
            }
            .switch-ui::after {
                content: '';
                position: absolute;
                top: 3px;
                left: 3px;
                width: 20px;
                height: 20px;
                border-radius: 50%;
                background: var(--toggle-knob);
                box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
                transition: transform 0.2s ease;
            }
            .switch-label input:checked + .switch-ui {
                background: var(--accent);
            }
            .switch-label input:checked + .switch-ui::after {
                transform: translateX(18px);
            }
            .switch-label input:focus-visible + .switch-ui {
                outline: 2px solid var(--accent);
                outline-offset: 2px;
            }

            .quiz-card {
                background: var(--bg-elevated);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 28px;
                box-shadow: var(--shadow-lg);
                transition: background 0.25s, border-color 0.25s;
            }

            .quiz-card h2 {
                margin: 0 0 8px;
                font-size: 1.35rem;
                font-weight: 600;
            }

            .quiz-card h3 {
                margin: 0 0 16px;
                font-size: 1.1rem;
                font-weight: 600;
                line-height: 1.4;
                color: var(--text);
            }

            .quiz-card.result-screen {
                text-align: center;
            }

            .quiz-card.result-screen h3.result-pass {
                color: var(--pass);
            }
            .quiz-card.result-screen h3.result-fail {
                color: var(--fail);
            }

            .quiz-card p {
                color: var(--text-muted);
                margin: 0 0 20px;
            }

            .top-info {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 12px;
                font-size: 13px;
                margin-bottom: 20px;
                padding: 10px 14px;
                border-radius: var(--radius-sm);
                background: var(--surface);
                border: 1px solid var(--border);
                color: var(--text-muted);
                font-family: var(--font-mono);
                font-weight: 500;
            }
            .top-info strong {
                color: var(--text);
                font-weight: 600;
            }

            button.option-button {
                display: block;
                width: 100%;
                margin: 0 0 10px;
                padding: 14px 16px;
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                cursor: pointer;
                font-family: var(--font);
                font-size: 15px;
                font-weight: 500;
                text-align: left;
                background: var(--surface);
                color: var(--text);
                transition: background 0.2s, border-color 0.2s, transform 0.15s;
            }
            button.option-button:hover:not(:disabled) {
                background: var(--surface-hover);
                border-color: var(--border-strong);
            }
            button.option-button:active:not(:disabled) {
                transform: scale(0.99);
            }
            button.option-button:focus-visible {
                outline: 2px solid var(--accent);
                outline-offset: 2px;
            }
            button.option-button:disabled {
                cursor: default;
                opacity: 1;
            }

            button.option-button.reveal-correct {
                border: 2px solid var(--reveal-correct-border);
                background: var(--reveal-correct-bg);
                color: var(--reveal-correct-text);
                font-weight: 600;
            }

            button.option-button.reveal-wrong {
                border: 2px solid var(--reveal-wrong-border);
                background: var(--reveal-wrong-bg);
                color: var(--reveal-wrong-text);
                font-weight: 600;
            }

            button.next-btn,
            button.secondary-btn {
                margin-top: 8px;
                margin-right: 8px;
                padding: 12px 22px;
                font-family: var(--font);
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                border: none;
                border-radius: var(--radius-sm);
                transition: transform 0.15s, filter 0.2s;
            }
            button.next-btn:hover,
            button.secondary-btn:hover {
                filter: brightness(1.06);
            }
            button.next-btn:active,
            button.secondary-btn:active {
                transform: scale(0.98);
            }
            button.next-btn {
                background: var(--accent);
                color: #fff;
                box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
            }
            button.secondary-btn {
                background: var(--surface);
                color: var(--text);
                border: 1px solid var(--border);
            }
            [data-theme='dark'] button.secondary-btn {
                background: var(--tab-inactive);
            }

            .empty-state {
                text-align: center;
                padding: 48px 24px;
                color: var(--text-muted);
                background: var(--bg-elevated);
                border-radius: var(--radius);
                border: 1px dashed var(--border);
            }

            @media (max-width: 600px) {
                body {
                    padding: 16px 14px 32px;
                }
                .app-header {
                    flex-direction: column;
                    align-items: stretch;
                }
                .toolbar {
                    justify-content: space-between;
                }
                .tabs button.tab {
                    flex: 1 1 calc(50% - 4px);
                    text-align: center;
                    font-size: 12px;
                    padding: 10px 8px;
                }
                .quiz-card {
                    padding: 20px 16px;
                }
                .top-info {
                    flex-direction: column;
                    text-align: center;
                    font-size: 12px;
                }
                button.next-btn,
                button.secondary-btn {
                    width: 100%;
                    margin-right: 0;
                }
            }
        </style>
    </head>
    <body>
        <div class="app-shell">

            function escapeHtml(s) {
                return String(s)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            function normalizeItems(items) {
                return items.map((item) => ({
                    q: item.question,
                    a: item.variations.map((v) => v.text),
                    correct: item.variations.findIndex((v) => v.isAnswer)
                }));
            }

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            /** Копия вопросов; при shuffleQuestionOrder — перемешать только порядок вопросов. Порядок вариантов в UI — в showQuestion. */
            function buildWorkingList(originalNormalized, shuffleQuestionOrder) {
                const list = originalNormalized.map((q) => ({
                    q: q.q,
                    a: [...q.a],
                    correct: q.correct
                }));
                if (shuffleQuestionOrder) shuffleArray(list);
                return list;
            }

            /** @type {{ original: ReturnType<normalizeItems>, working: ReturnType<normalizeItems>, currentIndex: number, score: number, answered: number, finished: boolean }[]} */
            const tabStates = QUIZZES.map((quiz) => {
                const original = normalizeItems(quiz.items);
                return {
                    original,
                    working: buildWorkingList(original, false),
                    currentIndex: 0,
                    score: 0,
                    answered: 0,
                    finished: false
                };
            });

                return document.documentElement.getAttribute('data-theme') === 'dark'

                    : 'light';
            }

            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                try {
                    localStorage.setItem('multi-quiz-theme', theme);
                } catch (e) {}
                syncThemeToggle();
            }

                const btn = document.getElementById('themeToggle');
                const icon = document.getElementById('themeIcon');
                const label = document.getElementById('themeLabel');
                if (!btn) return;
                const isDark = getTheme() === 'dark';
                btn.setAttribute('aria-pressed', isDark ? 'true' : 'false');
                if (icon) icon.textContent = isDark ? '☀️' : '🌙';
                if (label) label.textContent = isDark ? 'Светлая тема' : 'Тёмная тема';
                btn.title = isDark ? 'Включить светлую тему' : 'Включить тёмную тему';
            }

            function initThemeToggle() {
                syncThemeToggle();
                const btn = document.getElementById('themeToggle');
                if (btn) {
                    btn.addEventListener('click', function () {
                        setTheme(getTheme() === 'dark' ? 'light' : 'dark');
                    });
                }
            }

            function reapplyShuffleForActiveTab() {
                const st = tabStates[activeTab];
                st.working = buildWorkingList(st.original, shuffleToggle.checked);
                st.currentIndex = 0;
                st.score = 0;
                st.answered = 0;
                st.finished = false;
            }

            function renderTabs() {
                const bar = document.getElementById('tabBar');
                bar.innerHTML = QUIZZES.map((q, i) => {
                    const cls = i === activeTab ? 'tab active' : 'tab';
                    const n = q.items.length;
                    return `<button type="button" class="${cls}" data-tab="${i}" aria-selected="${
                        i === activeTab
                    }">${escapeHtml(q.title)} (${n})</button>`;
                }).join('');
                bar.querySelectorAll('button.tab').forEach((btn) => {
                    btn.addEventListener('click', () => {
                        const i = parseInt(btn.getAttribute('data-tab'), 10);
                        if (i === activeTab) return;
                        activeTab = i;
                        renderTabs();
                        renderPanel();
                    });
                });
            }

            function renderPanel() {
                const st = tabStates[activeTab];
                if (st.finished) {
                    showResultScreen();
                    return;
                }
                showQuestion();
            }

            function showQuestion() {
                const qc = document.getElementById('question-container');
                const st = tabStates[activeTab];
                const questionData = st.working;
                const qObj = questionData[st.currentIndex];

                let answers = qObj.a.map((ans, i) => ({ans, index: i}));
                if (shuffleToggle.checked) shuffleArray(answers);

                qc.innerHTML = `
                    <div class="quiz-card">
                      <div class="top-info">
                        <div>Вопрос: <strong>${st.currentIndex + 1}</strong> / ${
                    questionData.length
                }</div>
                        <div>Верно: <strong>${st.score}</strong> / ${st.answered}</div>
                      </div>
                      <h3>${escapeHtml(qObj.q)}</h3>
                      <div id="options">
                        ${answers
                            .map(
                                (opt) =>
                                    `<button type="button" class="option-button" id="option-${
                                        opt.index
                                    }" onclick="checkAnswer(${opt.index})">${escapeHtml(
                                        opt.ans
                                    )}</button>`
                            )
                            .join('')}
                      </div>
                      <div id="feedback"></div>
                    </div>
                `;
            }

            function checkAnswer(selectedIndex) {
                const st = tabStates[activeTab];
                const questionData = st.working;
                const qObj = questionData[st.currentIndex];
                const feedback = document.getElementById('feedback');
                st.answered++;

                qObj.a.forEach((_, i) => {
                    const btn = document.getElementById(`option-${i}`);
                    if (!btn) return;
                    btn.disabled = true;
                    if (i === qObj.correct) btn.classList.add('reveal-correct');
                    if (i === selectedIndex && selectedIndex !== qObj.correct)
                        btn.classList.add('reveal-wrong');
                });

                if (selectedIndex === qObj.correct) st.score++;

                feedback.innerHTML += `<button type="button" class="next-btn" onclick="nextQuestion()">Следующий вопрос</button>`;
                const top = document.querySelector('.top-info');
                if (top) {
                    top.innerHTML = `<div>Вопрос: <strong>${st.currentIndex + 1}</strong> / ${
                        questionData.length
                    }</div>
                        <div>Верно: <strong>${st.score}</strong> / ${st.answered}</div>`;
                }
            }

            function nextQuestion() {
                const st = tabStates[activeTab];
                const questionData = st.working;
                st.currentIndex++;
                if (st.currentIndex < questionData.length) {
                    showQuestion();
                } else {
                    st.finished = true;
                    showResultScreen();
                }
            }

            function showResultScreen() {
                const st = tabStates[activeTab];
                const qc = document.getElementById('question-container');
                const answered = st.answered;
                const percentage = answered > 0 ? (st.score / answered) * 100 : 0;
                const passed = percentage >= 60;
                const resultText = passed ? 'Тест пройден' : 'Тест не пройден';
                const resultClass = passed ? 'result-pass' : 'result-fail';
                const title = QUIZZES[activeTab].title;

                qc.innerHTML = `
                    <div class="quiz-card result-screen">
                        <h2>${escapeHtml(title)}</h2>
                        <h3 class="${resultClass}">${resultText}</h3>
                        <p>Результат: ${st.score} из ${answered} (${percentage.toFixed(1)}%)</p>
                        <button type="button" class="secondary-btn" onclick="restartCurrentTab()">Начать этот тест заново</button>
                    </div>
                `;
            }

            function restartCurrentTab() {
                reapplyShuffleForActiveTab();
                renderPanel();
            }

            shuffleToggle.addEventListener('change', () => {
                reapplyShuffleForActiveTab();
                renderPanel();
            });

            window.checkAnswer = checkAnswer;
            window.nextQuestion = nextQuestion;
            window.restartCurrentTab = restartCurrentTab;

            window.onload = function () {
                initThemeToggle();
                if (!QUIZZES.length) {
                    document.getElementById('question-container').innerHTML =
                        '<p class="empty-state">Добавьте хотя бы один объект в массив QUIZZES.</p>';
                    return;
                }
                renderTabs();
                renderPanel();
            };
        </script>
    </body>
</html>
