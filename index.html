                                    text: 'комплекс взаимоувязанных мероприятий, направленных на осуществление либо привлечение инвестиций для получения экономических, социальных и других выгод',
                                    isAnswer: false
                                },
                                {
                                    text: 'обязательство инвестора, принимаемое им для достижения определенных целей',
                                    isAnswer: false
                                },
                                {
                                    text: 'совокупность действий субъектов инвестиционной деятельности, связанная с осуществлением инвестиций',
                                    isAnswer: false
                                }
                            ]
                        },
                        {
                            question:
                                'На какую деятельность, в первую очередь, влияет государственная система налогообложения?',
                            variations: [
                                {text: 'предпринимательство', isAnswer: true},
                                {text: 'фундаментальная наука', isAnswer: false},
                                {text: 'оборона', isAnswer: false},
                                {text: 'гражданская авиация', isAnswer: false}
                            ]
                        },
                        {
                            question:
                                'Какие отличительные особенности характеризуют директивно-плановую экономику?',
                            variations: [
                                {
                                    text: 'централизованное планирование объемов производства промышленных товаров;',
                                    isAnswer: true
                                },
                                {
                                    text: 'различные формы собственности на средства производства;',
                                    isAnswer: false
                                },
                                {
                                    text: 'общественная собственность и коллективное принятие управленческих решений;',
                                    isAnswer: false
                                },
                                {text: 'контрактная система найма работников;', isAnswer: false}
                            ]
                        },
                        {
                            question: 'В чем особенность американской модели рыночной экономики?',
                            variations: [
                                {
                                    text: 'всемерное поощрение предпринимательской активности;',
                                    isAnswer: true
                                },
                                {text: 'сильная социальная политика;', isAnswer: false},
                                {
                                    text: 'основой экономических отношений является обеспечение экономических интересов каждого человека;',
                                    isAnswer: false
                                },
                                {
                                    text: 'отставание уровня жизни населения от роста производительности труда;',
                                    isAnswer: false
                                }
                            ]
                        },
                        {
                            question:
                                'Как называется процесс, в результате которого происходит вытеснения высококачественной продукции товарами низкого качества?',
                            variations: [
                                {text: 'отрицательная селекция', isAnswer: true},
                                {text: 'асимметричность информации', isAnswer: false},
                                {text: 'перепроизводства продукции', isAnswer: false},
                                {text: 'дефицит товаров', isAnswer: false}
                            ]
                        }
                    ]
                },
                {
                    title: 'Тест 2 (пример)',
                    items: [
                        {
                            question: 'Антимонопольное регулирование направлено на:',
                            variations: [
                                {text: 'Предотвращение ограничения конкуренции', isAnswer: true},
                                {text: 'Увеличение налогов', isAnswer: false},
                                {text: 'Поддержку монополий', isAnswer: false},
                                {text: 'Установление цен', isAnswer: false}
                            ]
                        },
                        {
                            question: 'Монетарную политику обычно осуществляет:',
                            variations: [
                                {text: 'Центральный банк', isAnswer: true},
                                {text: 'Парламент', isAnswer: false},
                                {text: 'Президент', isAnswer: false},
                                {text: 'Министерство образования', isAnswer: false}
                            ]
                        }
                    ]
                }
            ];
            /* ========== конец данных ========== */

            function escapeHtml(s) {
                return String(s)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            function normalizeItems(items) {
                return items.map((item) => ({
                    q: item.question,
                    a: item.variations.map((v) => v.text),
                    correct: item.variations.findIndex((v) => v.isAnswer)
                }));
            }

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            /** Копия вопросов; при shuffleQuestionOrder — перемешать только порядок вопросов. Порядок вариантов в UI — в showQuestion. */
            function buildWorkingList(originalNormalized, shuffleQuestionOrder) {
                const list = originalNormalized.map((q) => ({
                    q: q.q,
                    a: [...q.a],
                    correct: q.correct
                }));
                if (shuffleQuestionOrder) shuffleArray(list);
                return list;
            }

            /** @type {{ original: ReturnType<normalizeItems>, working: ReturnType<normalizeItems>, currentIndex: number, score: number, answered: number, finished: boolean }[]} */
            const tabStates = QUIZZES.map((quiz) => {
                const original = normalizeItems(quiz.items);
                return {
                    original,
                    working: buildWorkingList(original, false),
                    currentIndex: 0,
                    score: 0,
                    answered: 0,
                    finished: false
                };
            });

            let activeTab = 0;
            const shuffleToggle = document.getElementById('shuffleToggle');

            function reapplyShuffleForActiveTab() {
                const st = tabStates[activeTab];
                st.working = buildWorkingList(st.original, shuffleToggle.checked);
                st.currentIndex = 0;
                st.score = 0;
                st.answered = 0;
                st.finished = false;
            }

            function renderTabs() {
                const bar = document.getElementById('tabBar');
                bar.innerHTML = QUIZZES.map((q, i) => {
                    const cls = i === activeTab ? 'tab active' : 'tab';
                    const n = q.items.length;
                    return `<button type="button" class="${cls}" data-tab="${i}" aria-selected="${
                        i === activeTab
                    }">${escapeHtml(q.title)} (${n})</button>`;
                }).join('');
                bar.querySelectorAll('button.tab').forEach((btn) => {
                    btn.addEventListener('click', () => {
                        const i = parseInt(btn.getAttribute('data-tab'), 10);
                        if (i === activeTab) return;
                        activeTab = i;
                        renderTabs();
                        renderPanel();
                    });
                });
            }

            function renderPanel() {
                const st = tabStates[activeTab];
                if (st.finished) {
                    showResultScreen();
                    return;
                }
                showQuestion();
            }

            function showQuestion() {
                const qc = document.getElementById('question-container');
                const st = tabStates[activeTab];
                const questionData = st.working;
                const qObj = questionData[st.currentIndex];

                let answers = qObj.a.map((ans, i) => ({ans, index: i}));
                if (shuffleToggle.checked) shuffleArray(answers);

                qc.innerHTML = `
                <div class="quiz-card">
                  <div class="top-info">
                    <div>Вопрос: ${st.currentIndex + 1} / ${questionData.length}</div>
                    <div>Верно: ${st.score} / ${st.answered}</div>
                  </div>
                  <h3>${escapeHtml(qObj.q)}</h3>
                  <div id="options">
                    ${answers
                        .map(
                            (opt) =>
                                `<button type="button" class="option-button" id="option-${
                                    opt.index
                                }" onclick="checkAnswer(${opt.index})">${escapeHtml(
                                    opt.ans
                                )}</button>`
                        )
                        .join('')}
                  </div>
                  <div id="feedback"></div>
                </div>
            `;
            }

            function checkAnswer(selectedIndex) {
                const st = tabStates[activeTab];
                const questionData = st.working;
                const qObj = questionData[st.currentIndex];
                const feedback = document.getElementById('feedback');
                st.answered++;

                qObj.a.forEach((_, i) => {
                    const btn = document.getElementById(`option-${i}`);
                    if (!btn) return;
                    btn.disabled = true;
                    if (i === qObj.correct) {
                        btn.style.border = '2px solid #4caf50';
                        btn.style.background = '#4caf50';
                        btn.style.color = '#fff';
                    }
                    if (i === selectedIndex && selectedIndex !== qObj.correct) {
                        btn.style.border = '2px solid #f44336';
                        btn.style.background = '#f44336';
                        btn.style.color = '#fff';
                    }
                });

                if (selectedIndex === qObj.correct) st.score++;

                feedback.innerHTML += `<button type="button" class="next-btn" onclick="nextQuestion()">Следующий вопрос</button>`;
                const top = document.querySelector('.top-info');
                if (top) {
                    top.innerHTML = `<div>Вопрос: ${st.currentIndex + 1} / ${
                        questionData.length
                    }</div>
                    <div>Верно: ${st.score} / ${st.answered}</div>`;
                }
            }

            function nextQuestion() {
                const st = tabStates[activeTab];
                const questionData = st.working;
                st.currentIndex++;
                if (st.currentIndex < questionData.length) {
                    showQuestion();
                } else {
                    st.finished = true;
                    showResultScreen();
                }
            }

            function showResultScreen() {
                const st = tabStates[activeTab];
                const qc = document.getElementById('question-container');
                const answered = st.answered;
                const percentage = answered > 0 ? (st.score / answered) * 100 : 0;
                const passed = percentage >= 60;
                const resultText = passed ? 'Тест пройден' : 'Тест не пройден';
                const resultColor = passed ? '#4CAF50' : '#f44336';
                const title = QUIZZES[activeTab].title;

                qc.innerHTML = `
                <div class="quiz-card" style="text-align:center;">
                    <h2>${escapeHtml(title)}</h2>
                    <h3 style="color: ${resultColor};">${resultText}</h3>
                    <p>Результат: ${st.score} из ${answered} (${percentage.toFixed(1)}%)</p>
                    <button type="button" class="secondary-btn" onclick="restartCurrentTab()">Начать этот тест заново</button>
                </div>
            `;
            }

            function restartCurrentTab() {
                reapplyShuffleForActiveTab();
                renderPanel();
            }

            shuffleToggle.addEventListener('change', () => {
                reapplyShuffleForActiveTab();
                renderPanel();
            });

            window.checkAnswer = checkAnswer;
            window.nextQuestion = nextQuestion;
            window.restartCurrentTab = restartCurrentTab;

            window.onload = function () {
                if (!QUIZZES.length) {
                    document.getElementById('question-container').innerHTML =
                        '<p>Добавьте хотя бы один объект в массив QUIZZES.</p>';
                    return;
                }
                renderTabs();
                renderPanel();
            };
        </script>
    </body>
</html>
